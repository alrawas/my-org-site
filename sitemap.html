<style>
  :root {
    --accent: #c47f30;
    --accent-hover: #a8681e;
    --bg: #faf6f0;
    --text: #3b2f1e;
    --border: #d9cbb8;
    --code-bg: #f0e8da;
    --card-bg: #fff8ee;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1510;
      --text: #e0d5c5;
      --border: #3a3228;
      --code-bg: #231e17;
      --card-bg: #231e17;
      --accent: #d4944a;
      --accent-hover: #e8a85e;
    }
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
  }

  h1, h2, h3, h4, h5, h6 {
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -0.02em;
  }

  a {
    color: var(--accent);
  }

  a:hover {
    color: var(--accent-hover);
    text-decoration: underline;
  }

  code, pre, .src {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9em;
  }

  pre {
    background: var(--code-bg);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    padding: 1em;
    overflow-x: auto;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 1em;
  }

  header h1 {
    color: var(--accent);
  }

  footer {
    border-top: 1px solid var(--border);
    opacity: 0.7;
    font-size: 0.85em;
  }

  #table-of-contents {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1em 1.5em;
    margin-bottom: 2em;
  }

  #table-of-contents h2 {
    font-size: 0.9em;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.6;
    margin-top: 0;
  }

  ::selection {
    background: var(--accent);
    color: var(--bg);
  }

  /* Nav bar */
  nav {
    display: flex;
    gap: 1.5em;
    padding: 0.8em 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.5em;
    font-size: 0.9em;
  }

  nav a {
    text-decoration: none;
    opacity: 0.8;
  }

  nav a:hover {
    opacity: 1;
  }

  /* Custom footer */
  #postamble {
    border-top: 1px solid var(--border);
    margin-top: 3em;
    padding-top: 1em;
    opacity: 0.5;
    font-size: 0.8em;
    text-align: center;
  }

  /* CRT scanline overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9999;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.03) 0px,
      rgba(0, 0, 0, 0.03) 1px,
      transparent 1px,
      transparent 3px
    );
  }

  /* Screen edge vignette */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9998;
    box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.25);
  }

  /* Subtle screen flicker */
  @keyframes flicker {
    0%   { opacity: 0.97; }
    5%   { opacity: 0.95; }
    10%  { opacity: 0.98; }
    15%  { opacity: 0.96; }
    20%  { opacity: 0.99; }
    100% { opacity: 0.98; }
  }

  body {
    animation: flicker 4s infinite;
  }

  /* Slight text glow for that phosphor feel */
  @media (prefers-color-scheme: dark) {
    body {
      text-shadow: 0 0 2px rgba(224, 213, 197, 0.15);
    }
    header h1 {
      text-shadow: 0 0 8px rgba(212, 148, 74, 0.3);
    }
  }
</style>
